<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mercadão dos Óculos | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../styles/variables.css">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/pages/login.css">
  <link rel="icon" href="../assets/icons/mdo.ico" type="image/x-icon">

  <link rel="manifest" href="/iris/manifest.json">
  <meta name="theme-color" content="#F0464F">
</head>

<body>

  <div class="bg-mesh" aria-hidden="true">
    <div class="mesh-blob mesh-blob--1"></div>
    <div class="mesh-blob mesh-blob--2"></div>
  </div>

  <main class="login-page">
    <section class="login-card">
      <div class="login-card__accent" aria-hidden="true"></div>

      <header class="login-header">
        <div class="login-logo-wrap">
          <img src="../assets/logo/mdo.png" alt="Mercadão dos Óculos" class="login-logo">
        </div>
        <h1 class="login-title">Entrar no <span class="accent">CRM</span></h1>
        <p class="login-subtitle">Digite sua chave de acesso para continuar.</p>
      </header>

      <form id="loginForm" class="login-form" novalidate>

        <div class="field-group">
          <label for="accessKey" class="field-label">Chave de Acesso</label>
          <div class="field-input-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
              </svg>
            </span>
            <input type="password" id="accessKey" name="accessKey" placeholder="••••••••••••" autocomplete="off"
              required class="field-input">
            <button type="button" class="field-toggle" id="toggleKey" aria-label="Mostrar ou ocultar chave">
              <svg class="eye-icon eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg class="eye-icon eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn">
          <span class="login-btn__text">Entrar</span>
          <svg class="login-btn__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
          </svg>
        </button>

        <span id="loginError" class="login-error" role="alert" aria-live="polite"></span>
      </form>
    </section>
  </main>

  <script type="module" src="../scripts/pages/login.js"></script>
</body>

</html>
