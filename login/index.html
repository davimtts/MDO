<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>MDO - Login</title>
  <link rel="icon" href="../assets/icons/mdo.ico" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/components/form.css">
  <link rel="stylesheet" href="../styles/pages/login.css">
</head>

<body>

  <main class="login-page">

    <section class="login-brand">
      <div class="login-brand__mark">
        <img src="../assets/logo/mdo.png" alt="Logo do Mercadão dos Óculos">
      </div>

      <h1>Mercadão CRM</h1>
      <p>Sistema interno para organizar clientes, interesses e oportunidades de venda.</p>
    </section>

    <section class="login-card">

      <div class="login-tabs">
        <button id="loginTab" class="login-tab active" type="button">Entrar</button>
        <button id="registerTab" class="login-tab" type="button">Cadastrar</button>
      </div>

      <form id="loginForm" class="auth-form">
        <h2>Entrar no sistema</h2>

        <div class="field-group">
          <label class="field-label" for="loginEmail">E-mail</label>

          <div class="field-input-wrap">
            <span class="field-icon">
              <i class="fa-solid fa-envelope"></i>
            </span>

            <input
              id="loginEmail"
              class="field-input"
              type="email"
              placeholder="seu@email.com"
              autocomplete="email"
              required
            >
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="loginPassword">Senha</label>

          <div class="field-input-wrap">
            <span class="field-icon">
              <i class="fa-solid fa-lock"></i>
            </span>

            <input
              id="loginPassword"
              class="field-input"
              type="password"
              placeholder="Sua senha"
              autocomplete="current-password"
              required
            >
          </div>
          <a href="#" class="forgot-password">Esqueci minha senha</a>
        </div>
        

        <button class="auth-submit" type="submit">
          Entrar
        </button>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <h2>Criar conta</h2>

        <div class="field-group">
          <label class="field-label" for="registerName">Nome</label>

          <div class="field-input-wrap">
            <span class="field-icon">
              <i class="fa-solid fa-user"></i>
            </span>

            <input
              id="registerName"
              class="field-input"
              type="text"
              placeholder="Nome e Sobrenome"
              autocomplete="name"
              required
            >
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="registerEmail">E-mail</label>

          <div class="field-input-wrap">
            <span class="field-icon">
              <i class="fa-solid fa-envelope"></i>
            </span>

            <input
              id="registerEmail"
              class="field-input"
              type="email"
              placeholder="seu@email.com"
              autocomplete="email"
              required
            >
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="registerPassword">Senha</label>

          <div class="field-input-wrap">
            <span class="field-icon">
              <i class="fa-solid fa-lock"></i>
            </span>

            <input
              id="registerPassword"
              class="field-input"
              type="password"
              placeholder="Mínimo 6 caracteres"
              autocomplete="new-password"
              required
            >
          </div>
        </div>

        <button class="auth-submit" type="submit">
          Criar conta
        </button>
      </form>

      <p id="authMessage" class="auth-message"></p>

    </section>

  </main>

  <script type="module" src="../scripts/pages/login.js"></script>
</body>

</html>
