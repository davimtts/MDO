<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Mercadão dos Óculos - Clientes</title>
  <link rel="icon" href="../assets/icons/mdo.ico" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="manifest" href="/iris/manifest.json">
  <meta name="theme-color" content="#F0464F">


  <link rel="stylesheet" href="../styles/global.css">

  <link rel="stylesheet" href="../styles/components/topbar.css">
  <link rel="stylesheet" href="../styles/components/toast.css">
  <link rel="stylesheet" href="../styles/components/modal.css">
  <link rel="stylesheet" href="../styles/components/form.css">
  <link rel="stylesheet" href="../styles/components/badges.css">
  <link rel="stylesheet" href="../styles/components/client-list.css">
  <link rel="stylesheet" href="../styles/components/client-panel.css">
  <link rel="stylesheet" href="../styles/components/bottom-nav.css">
  <link rel="stylesheet" href="../styles/components/sidebar.css">

  <link rel="stylesheet" href="../styles/pages/clientes.css">
</head>

<body>

  <div id="sidebar-root"></div>
  <div id="topbar-root"></div>

  <main class="main-content">

    <section class="clients-header">
      <h1 class="clients-header__title">Clientes</h1>
      <p class="clients-header__subtitle">Gerencie e acompanhe seus clientes.</p>
    </section>

    <section class="clients-search">
      <div class="field-input-wrap">
        <span class="field-icon">
          <i class="fa-solid fa-magnifying-glass"></i>
        </span>
        <input id="clientSearch" class="field-input" type="text" placeholder="Buscar por nome ou telefone...">
      </div>

      <button id="toggleFiltersButton" class="filter-button" type="button">
        <i class="fa-solid fa-sliders"></i>
        Filtros
      </button>
    </section>

    <section class="filter-section" id="filtersArea">
      <h2 class="filter-title">Filtrar por origem</h2>
      <div id="originFilters" class="filter-grid">
        <button class="filter-card active" type="button" data-origin="all">
          <i class="fa-solid fa-border-all"></i>
          <span>Todos</span>
          <strong id="originAllCount">0</strong>
        </button>
        <button class="filter-card" type="button" data-origin="loja_fisica">
          <i class="fa-solid fa-store"></i>
          <span>Loja</span>
          <strong id="originStoreCount">0</strong>
        </button>
        <button class="filter-card" type="button" data-origin="trafego_pago">
          <i class="fa-solid fa-bullhorn"></i>
          <span>Tráfego</span>
          <strong id="originPaidCount">0</strong>
        </button>
        <button class="filter-card" type="button" data-origin="indicacao">
          <i class="fa-solid fa-users"></i>
          <span>Indicação</span>
          <strong id="originReferralCount">0</strong>
        </button>
        <button class="filter-card" type="button" data-origin="pos_venda">
          <i class="fa-solid fa-tags"></i>
          <span>Pós Venda</span>
          <strong id="originPosVendaCount">0</strong>
        </button>
        <button class="filter-card" type="button" data-origin="aniversariante">
          <i class="fa-solid fa-cake-candles"></i>
          <span>Aniversariante</span>
          <strong id="originAniversarianteCount">0</strong>
        </button>
        <button class="filter-card" type="button" data-origin="acao">
          <i class="fa-solid fa-bullhorn"></i>
          <span>Ação</span>
          <strong id="originAcaoCount">0</strong>
        </button>
        
      </div>
    </section>

    <section class="filter-section">
      <h2 class="filter-title">Filtrar por status</h2>
      <div id="statusFilters" class="filter-grid">
        <button class="filter-card active" type="button" data-status="all">
          <span>Todos</span>
          <strong id="statusAllCount">0</strong>
        </button>
      </div>
    </section>

    <section class="clients-table-panel">
      <div id="clientsList" class="clients-table-list">
        <article class="client-table-row client-skeleton">
          <div class="client-card-top">
            <div class="skeleton-circle"></div>

            <div class="client-main">
              <div class="skeleton-line skeleton-line--title"></div>

              <div class="client-meta">
                <div class="skeleton-line skeleton-line--small"></div>
                <div class="skeleton-line skeleton-line--tiny"></div>
              </div>

              <div class="skeleton-line skeleton-line--obs"></div>
            </div>

            <div class="skeleton-icon"></div>
          </div>

          <div class="client-interests">
            <div class="client-interest-row">
              <div class="client-interest-top">
                <div class="client-interest-main">
                  <div class="skeleton-pill"></div>
                  <div class="skeleton-line skeleton-line--interest"></div>
                </div>

                <div class="client-interest-meta">
                  <div class="skeleton-line skeleton-line--price"></div>
                </div>
              </div>
            </div>
          </div>
        </article>
      </div>

      <div id="clientsEmpty" class="client-list--empty">
        <i class="fa-regular fa-user"></i>
        <span>Nenhum cliente encontrado</span>
      </div>
    </section>

  </main>

  <div id="bottom-nav-root"></div>
  <div id="client-create-modal-root"></div>
  <div id="client-panel-root"></div>
  <div id="toast-root"></div>

  <script type="module" src="../scripts/pages/clientes.js"></script>
</body>

</html>
