<div id="clientModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal__backdrop" id="modalBackdrop"></div>

  <div class="modal__card">
    <div class="modal__header">
      <h2 class="modal__title" id="modalTitle">
        <i class="fa-solid fa-user-plus" aria-hidden="true"></i>
        Novo cliente
      </h2>

      <button id="closeClientModal" class="modal__close" aria-label="Fechar modal">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <form id="clientForm" class="modal__form" novalidate>

      <div class="form-section">
        <h3 class="form-section__title">
          <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
          Dados do cliente
        </h3>

        <div class="field-group">
          <label for="clientName" class="field-label">Nome</label>

          <div class="field-input-wrap">
            <span class="field-icon">
              <i class="fa-solid fa-user"></i>
            </span>

            <input
              id="clientName"
              type="text"
              class="field-input"
              placeholder="Nome completo"
              required
            >
          </div>
        </div>

        <div class="field-group">
          <label for="clientPhone" class="field-label">Telefone</label>

          <div class="field-input-wrap">
            <span class="field-icon">
              <i class="fa-solid fa-phone"></i>
            </span>

            <input
              id="clientPhone"
              type="tel"
              class="field-input"
              placeholder="(00) 00000-0000"
              required
            >
          </div>
        </div>

        <div class="field-group">
          <label for="clientOrigin" class="field-label">Origem</label>

          <div class="field-input-wrap field-input-wrap--select">
            <span class="field-icon">
              <i class="fa-solid fa-location-dot"></i>
            </span>

            <select id="clientOrigin" class="field-input field-select">
              <option value="trafego_pago">Tráfego Pago</option>
              <option value="loja_fisica">Loja Física</option>
            </select>

            <span class="field-chevron">
              <i class="fa-solid fa-chevron-down"></i>
            </span>
          </div>
        </div>

        <div class="field-group">
          <label for="clientObs" class="field-label">Observação</label>

          <textarea
            id="clientObs"
            class="field-textarea"
            placeholder="Observações sobre o cliente..."
          ></textarea>
        </div>
      </div>

      <div class="form-section">
        <h3 class="form-section__title">
          <i class="fa-solid fa-tag" aria-hidden="true"></i>
          Interesse opcional
        </h3>

        <div class="field-group">
          <label for="itemName" class="field-label">Descrição</label>

          <div class="field-input-wrap">
            <span class="field-icon">
              <i class="fa-solid fa-glasses"></i>
            </span>

            <input
              id="itemName"
              type="text"
              class="field-input"
              placeholder="Ex: Armação + lentes"
            >
          </div>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label for="itemPrice" class="field-label">Preço</label>

            <div class="field-input-wrap">
              <span class="field-icon">
                <i class="fa-solid fa-brazilian-real-sign"></i>
              </span>

              <input
                id="itemPrice"
                type="number"
                class="field-input"
                placeholder="0,00"
                min="0"
                step="0.01"
              >
            </div>
          </div>

          <div class="field-group">
            <label for="itemTemperature" class="field-label">Temperatura</label>

            <div class="field-input-wrap field-input-wrap--select">
              <span class="field-icon">
                <i class="fa-solid fa-fire"></i>
              </span>

              <select id="itemTemperature" class="field-input field-select">
                <option value="frio">❄️ Frio</option>
                <option value="morno">🌤 Morno</option>
                <option value="quente">🔥 Quente</option>
              </select>

              <span class="field-chevron">
                <i class="fa-solid fa-chevron-down"></i>
              </span>
            </div>
          </div>
        </div>

        <div class="field-group">
          <label for="itemStatus" class="field-label">Status</label>

          <div class="field-input-wrap field-input-wrap--select">
            <span class="field-icon">
              <i class="fa-solid fa-flag"></i>
            </span>

            <select id="itemStatus" class="field-input field-select">
              <option value="so_passou">Só passou</option>
              <option value="futuramente">Futuramente</option>
              <option value="analisando_orcamento">Analisando orçamento</option>
              <option value="aguardando_mensagem">Aguardando mensagem</option>
              <option value="concluido">Concluído</option>
            </select>

            <span class="field-chevron">
              <i class="fa-solid fa-chevron-down"></i>
            </span>
          </div>
        </div>

        <div class="field-group">
          <label for="itemObs" class="field-label">Observação do item</label>

          <textarea
            id="itemObs"
            class="field-textarea"
            placeholder="Detalhes adicionais..."
          ></textarea>
        </div>
      </div>

      <button type="submit" class="modal__submit">
        Salvar cliente
      </button>

      <p id="clientFormMessage" class="modal__message" role="alert" aria-live="polite"></p>
    </form>
  </div>
</div>
