<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mercadão dos Óculos - Início</title>
  <link rel="icon" href="../assets/icons/mdo.ico" type="image/x-icon">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link rel="manifest" href="/iris/manifest.json">
  <meta name="theme-color" content="#F0464F">

  <!-- Styles -->
  <link rel="stylesheet" href="../styles/global.css">

  <link rel="stylesheet" href="../styles/components/topbar.css">
  <link rel="stylesheet" href="../styles/components/toast.css">
  <link rel="stylesheet" href="../styles/components/modal.css">
  <link rel="stylesheet" href="../styles/components/form.css">
  <link rel="stylesheet" href="../styles/components/badges.css">
  <link rel="stylesheet" href="../styles/components/client-list.css">
  <link rel="stylesheet" href="../styles/components/client-panel.css">
  <link rel="stylesheet" href="../styles/components/bottom-nav.css">
  <link rel="stylesheet" href="../styles/components/sidebar.css">

  <link rel="stylesheet" href="../styles/pages/inicio.css">
</head>

<body>

  <div id="sidebar-root"></div>
  <div id="topbar-root"></div>

  <!-- ==============================
       MAIN CONTENT
       ============================== -->
  <main class="main-content" id="mainContent">

    <!-- Boas-vindas -->
    <section class="welcome" aria-label="Boas-vindas">
      <div class="welcome__text">
        <h1 class="welcome__title">
          Olá, <span class="welcome__name" id="userName"></span>!
          <i class="fa-solid fa-hand-wave welcome__wave" aria-hidden="true"></i>
        </h1>
        <p class="welcome__subtitle">Vamos focar nos seus clientes recentes.</p>
      </div>

      <!-- Notificações desktop (visível apenas no desktop) -->
      <button class="welcome__notifications" aria-label="Notificações">
        <i class="fa-solid fa-bell"></i>
        <span class="topbar__badge">3</span>
      </button>
    </section>

    <!-- Cards de resumo -->
    <section class="summary-grid" aria-label="Resumo">
      <article class="summary-card" style="--i:0">
        <div class="summary-card__icon">
          <i class="fa-solid fa-user-plus"></i>
        </div>
        <span class="summary-card__label">Novos clientes</span>
        <strong class="summary-card__value" id="newClientsCount">0</strong>
      </article>

      <article class="summary-card" style="--i:1">
        <div class="summary-card__icon">
          <i class="fa-solid fa-sack-dollar"></i>
        </div>
        <span class="summary-card__label">Oportunidades</span>
        <strong class="summary-card__value" id="opportunitiesCount">0</strong>
      </article>

      <article class="summary-card" style="--i:2">
        <div class="summary-card__icon">
          <i class="fa-solid fa-file-invoice-dollar"></i>
        </div>
        <span class="summary-card__label">Orçamentos</span>
        <strong class="summary-card__value" id="budgetCount">0</strong>
      </article>

      <article class="summary-card" style="--i:3">
        <div class="summary-card__icon summary-card__icon--accent">
          <i class="fa-solid fa-circle-check"></i>
        </div>
        <span class="summary-card__label">Vendas fechadas</span>
        <strong class="summary-card__value summary-card__value--accent" id="salesCount">0</strong>
      </article>
    </section>

    <!-- Grid inferior: lista + gráfico -->
    <div class="dashboard-grid">

      <!-- Aguardando mensagem -->
      <section class="panel" aria-label="Aguardando mensagem">
        <div class="panel__header">
          <h2 class="panel__title">
            <i class="fa-solid fa-clock panel__title-icon" aria-hidden="true"></i>
            Aguardando mensagem
          </h2>
          <span class="panel__count" id="pendingCount" aria-label="quantidade pendente">0</span>
        </div>
        <div id="pendingList" class="client-list" role="list"></div>
        <div class="client-list--empty" id="pendingEmpty">
          <i class="fa-regular fa-circle-check"></i>
          <span>Nenhum pendente</span>
        </div>
      </section>

      <!-- Clientes recentes -->
      <section class="panel" aria-label="Clientes recentes">
        <div class="panel__header">
          <h2 class="panel__title">
            <i class="fa-solid fa-users panel__title-icon" aria-hidden="true"></i>
            Clientes recentes
          </h2>
          <button class="panel__action">
            Ver todos <i class="fa-solid fa-arrow-right" style="font-size:10px"></i>
          </button>
        </div>
        <div id="recentClientsList" class="client-list" role="list"></div>
        <div class="client-list--empty" id="recentEmpty">
          <i class="fa-regular fa-user"></i>
          <span>Nenhum cliente ainda</span>
        </div>
      </section>

      <!-- Gráfico de vendas -->
      <section class="panel chart-panel" aria-label="Vendas no ano">
        <div class="panel__header">
          <h2 class="panel__title">
            <i class="fa-solid fa-chart-line panel__title-icon" aria-hidden="true"></i>
            Vendas neste mês
          </h2>

          <strong class="chart-panel__total" id="monthlySalesCount">0</strong>
        </div>
        <div class="chart-wrap" aria-hidden="true">
          <div class="chart-bars" id="salesChartBars">
            <div class="chart-bar" data-month="0"><span>Jan</span></div>
            <div class="chart-bar" data-month="1"><span>Fev</span></div>
            <div class="chart-bar" data-month="2"><span>Mar</span></div>
            <div class="chart-bar" data-month="3"><span>Abr</span></div>
            <div class="chart-bar" data-month="4"><span>Mai</span></div>
            <div class="chart-bar" data-month="5"><span>Jun</span></div>
            <div class="chart-bar" data-month="6"><span>Jul</span></div>
            <div class="chart-bar" data-month="7"><span>Ago</span></div>
            <div class="chart-bar" data-month="8"><span>Set</span></div>
            <div class="chart-bar" data-month="9"><span>Out</span></div>
            <div class="chart-bar" data-month="10"><span>Nov</span></div>
            <div class="chart-bar" data-month="11"><span>Dez</span></div>
          </div>
        </div>
      </section>

    </div><!-- /dashboard-grid -->
  </main>

  <div id="bottom-nav-root"></div>
  <div id="client-create-modal-root"></div>
  <div id="client-panel-root"></div>
  <div id="toast-root"></div>

  <script type="module" src="../scripts/pages/inicio.js"></script>

</html>
