<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background-color: black;">

<script type="module">

  import { onAuth } from "./scripts/services/authService.js";
  import { ROUTES } from "./scripts/utils/constants.js";

  let checked = false;

  onAuth(user => {

    if (checked) return;
    checked = true;

    if (user) {
      window.location.href = ROUTES.inicio;
      return;
    }

    window.location.href = ROUTES.home;

  });

</script>

</body>

</html>
